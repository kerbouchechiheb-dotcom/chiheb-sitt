<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiheb Site</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #060914;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .background-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at center, transparent 0, rgba(6, 9, 20, 0.22) 38%, rgba(6, 9, 20, 0.84) 100%),
        linear-gradient(rgba(6, 9, 20, 0.2), rgba(6, 9, 20, 0.52));
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(900px, 100%);
      text-align: center;
      padding: 34px 24px;
      border-radius: 8px;
      background: rgba(8, 13, 23, 0.38);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    h1 {
      font-size: clamp(36px, 7vw, 72px);
      margin-bottom: 10px;
    }

    p {
      color: #d8eef5;
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .tagline {
      min-height: 32px;
      color: #ffffff;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: bold;
      margin-bottom: 10px;
    }

    .cursor {
      display: inline-block;
      color: #ff4f81;
      animation: blink 0.8s infinite;
    }

    .bio {
      width: min(560px, 100%);
      margin: 0 auto 18px;
      color: rgba(216, 238, 245, 0.88);
      font-size: 17px;
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      font-weight: bold;
    }

    .photo {
      width: min(520px, 100%);
      max-height: 650px;
      object-fit: cover;
      border-radius: 8px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 28px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .photo[src=""] {
      display: none;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 8px;
      background: #ff4f81;
      color: white;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button.instagram {
      background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
    }

    .button.tiktok {
      background: linear-gradient(135deg, #00f2ea, #111111 48%, #ff0050);
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button:hover {
      background: #ff2f69;
      transform: translateY(-2px);
    }

    .button.instagram:hover,
    .button.tiktok:hover {
      filter: brightness(1.1);
    }

    .footer {
      margin-top: 22px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 14px;
    }

    @keyframes blink {
      0%,
      45% {
        opacity: 1;
      }

      46%,
      100% {
        opacity: 0;
      }
    }

  </style>
</head>
<body>
  <canvas class="background-canvas" id="backgroundCanvas" aria-hidden="true"></canvas>

  <main class="page">
    <h1>Chiheb</h1>
    <p class="tagline"><span id="typingText"></span><span class="cursor">|</span></p>
    <p class="bio">Welcome to my page. Follow me for more videos, photos, and daily moments.</p>

    <div class="badges">
      <span class="badge">Algeria</span>
      <span class="badge">Creator</span>
      <span class="badge">Follow me</span>
    </div>

    <img class="photo" id="photo" src="photo.jpg.jpg" alt="Chiheb photo">

    <div class="links">
      <a class="button instagram" href="https://www.instagram.com/chiheb_kerb/tagged/" target="_blank" rel="noopener">
        Open Instagram
      </a>

      <a class="button tiktok" href="https://www.tiktok.com/@chihebker0?_r=1&_t=ZS-97ABVIq9AGK" target="_blank" rel="noopener">
        Open TikTok
      </a>
    </div>

    <div class="footer">Made by Chiheb</div>
  </main>

  <script>
    const canvas = document.getElementById('backgroundCanvas');
    const gl = canvas.getContext('webgl', { alpha: true, antialias: true });

    if (gl) {
      const vertexShaderSource = `
        attribute vec2 position;

        void main() {
          gl_Position = vec4(position, 0.0, 1.0);
        }
      `;

      const fragmentShaderSource = `
        precision highp float;

        uniform vec3 iResolution;
        uniform vec2 iMouse;
        uniform float iTime;
        uniform vec3 uColor0;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform vec3 uColor3;
        uniform vec3 uColor4;
        uniform vec3 uColor5;
        uniform vec3 uColor6;
        uniform vec3 uColor7;
        uniform int uColorCount;
        uniform vec2 uFlow;
        uniform float uSpeed;
        uniform float uScale;
        uniform float uTurbulence;
        uniform float uFluidity;
        uniform float uRimWidth;
        uniform float uSharpness;
        uniform float uShimmer;
        uniform float uGlow;
        uniform float uOpacity;
        uniform float uMouseEnabled;
        uniform float uMouseStrength;
        uniform float uMouseRadius;

        #define PI 3.14159265

        float hash(vec3 p3) {
          p3 = fract(p3 * 0.1031);
          p3 += dot(p3, p3.zyx + 33.33);
          return fract((p3.x + p3.y) * p3.z);
        }

        float smin(float a, float b, float k) {
          float r = exp2(-a / k) + exp2(-b / k);
          return -k * log2(r);
        }

        float sinlerp(float a, float b, float w) {
          return mix(a, b, (sin(w * PI - PI / 2.0) + 1.0) / 2.0);
        }

        float vn(vec2 p, float s, float seed) {
          vec2 cellp = floor(p / s);
          vec2 relp = mod(p, s);
          float g1 = hash(vec3(cellp, seed));
          float g2 = hash(vec3(cellp.x + 1.0, cellp.y, seed));
          float g3 = hash(vec3(cellp.x + 1.0, cellp.y + 1.0, seed));
          float g4 = hash(vec3(cellp.x, cellp.y + 1.0, seed));
          float bx = sinlerp(g1, g2, relp.x / s);
          float tx = sinlerp(g4, g3, relp.x / s);
          return sinlerp(bx, tx, relp.y / s);
        }

        float dbn(vec2 p, float s, float seed) {
          float o = s / 2.0;
          float n0 = vn(p, s, seed);
          float n1 = vn(p + vec2(o, o), s, seed + 0.1);
          float n2 = vn(p + vec2(-o, o), s, seed + 0.2);
          float n3 = vn(p + vec2(o, -o), s, seed + 0.3);
          float n4 = vn(p + vec2(-o, -o), s, seed + 0.4);
          return (2.0 * n0 + 1.5 * n1 + 1.25 * n2 + 1.125 * n3 + n4) / 7.0;
        }

        vec3 palette(float h) {
          int count = uColorCount;
          if (count < 1) count = 1;
          int idx = int(floor(clamp(h, 0.0, 0.999999) * float(count)));
          if (idx <= 0) return uColor0;
          if (idx == 1) return uColor1;
          if (idx == 2) return uColor2;
          if (idx == 3) return uColor3;
          if (idx == 4) return uColor4;
          if (idx == 5) return uColor5;
          if (idx == 6) return uColor6;
          return uColor7;
        }

        void main() {
          float ref = 700.0 / max(uScale, 0.05);
          vec2 p = gl_FragCoord.xy / iResolution.y * ref;

          float spd = 200.0 * uSpeed;
          float t = iTime;

          vec2 dir = uFlow;
          vec2 perp = vec2(-dir.y, dir.x);

          float distort1 = vn(p + perp * (t * spd), 60.0, 10.0) * 50.0 * uTurbulence;
          float distort2 = vn(p - perp * (t * spd), 120.0, 15.0) * 100.0 * uTurbulence;

          float peaks = dbn(p + distort1 + dir * (t * spd * 0.5), 40.0, 1.0);
          float peaks2 = dbn(p + distort2 - dir * (t * spd * 0.5), 40.0, 0.0);
          float mapeaks = smin(peaks, peaks2, max(uFluidity, 0.001));

          float mGlow = 0.0;
          if (uMouseEnabled > 0.5) {
            vec2 mp = iMouse / iResolution.y * ref;
            float md = length(p - mp) / ref;
            float rr = max(uMouseRadius, 0.02);
            mGlow = exp(-md * md / (rr * rr)) * uMouseStrength;
          }

          float band = (uRimWidth - abs((mapeaks - 0.4) * 2.0)) * 5.0;
          float ltn = clamp(band - vn(p + dir * (t * spd * 0.5), 60.0, 12.0) * uShimmer, 0.0, 1.0);
          ltn = pow(ltn, uSharpness) * uGlow;
          ltn *= clamp(1.0 - mGlow, 0.0, 1.0);

          float h = clamp(0.5 + (peaks - peaks2) * 0.8, 0.0, 1.0);
          vec3 col = palette(h);
          vec3 outc = col * ltn;
          float a = clamp(max(outc.r, max(outc.g, outc.b)), 0.0, 1.0);
          gl_FragColor = vec4(outc, a * uOpacity);
        }
      `;

      const createShader = (type, source) => {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader));
        }
        return shader;
      };

      const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
      const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);
      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(program));
      }
      gl.useProgram(program);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

      const position = gl.getAttribLocation(program, 'position');
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const resolutionUniform = gl.getUniformLocation(program, 'iResolution');
      const mouseUniform = gl.getUniformLocation(program, 'iMouse');
      const timeUniform = gl.getUniformLocation(program, 'iTime');
      const mouseCurrent = { x: 0, y: 0 };
      const mouse = { x: 0, y: 0 };

      const setUniform3 = (name, value) => {
        gl.uniform3f(gl.getUniformLocation(program, name), value[0], value[1], value[2]);
      };

      const white = [1, 1, 1];
      setUniform3('uColor0', white);
      setUniform3('uColor1', white);
      setUniform3('uColor2', white);
      setUniform3('uColor3', white);
      setUniform3('uColor4', white);
      setUniform3('uColor5', white);
      setUniform3('uColor6', white);
      setUniform3('uColor7', white);
      gl.uniform1i(gl.getUniformLocation(program, 'uColorCount'), 3);
      gl.uniform2f(gl.getUniformLocation(program, 'uFlow'), 0, -1);
      gl.uniform1f(gl.getUniformLocation(program, 'uSpeed'), 0.5);
      gl.uniform1f(gl.getUniformLocation(program, 'uScale'), 1.6);
      gl.uniform1f(gl.getUniformLocation(program, 'uTurbulence'), 1);
      gl.uniform1f(gl.getUniformLocation(program, 'uFluidity'), 0.1);
      gl.uniform1f(gl.getUniformLocation(program, 'uRimWidth'), 0.2);
      gl.uniform1f(gl.getUniformLocation(program, 'uSharpness'), 2.5);
      gl.uniform1f(gl.getUniformLocation(program, 'uShimmer'), 1.5);
      gl.uniform1f(gl.getUniformLocation(program, 'uGlow'), 2);
      gl.uniform1f(gl.getUniformLocation(program, 'uOpacity'), 1);
      gl.uniform1f(gl.getUniformLocation(program, 'uMouseEnabled'), 1);
      gl.uniform1f(gl.getUniformLocation(program, 'uMouseStrength'), 1);
      gl.uniform1f(gl.getUniformLocation(program, 'uMouseRadius'), 0.35);

      const resizeCanvas = () => {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform3f(resolutionUniform, canvas.width, canvas.height, 1);
        mouse.x = canvas.width * 0.5;
        mouse.y = canvas.height * 0.5;
        mouseCurrent.x = mouse.x;
        mouseCurrent.y = mouse.y;
      };

      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('pointermove', event => {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        mouse.x = event.clientX * dpr;
        mouse.y = (window.innerHeight - event.clientY) * dpr;
      });

      const render = time => {
        mouseCurrent.x += (mouse.x - mouseCurrent.x) * 0.12;
        mouseCurrent.y += (mouse.y - mouseCurrent.y) * 0.12;
        gl.uniform1f(timeUniform, time * 0.001);
        gl.uniform2f(mouseUniform, mouseCurrent.x, mouseCurrent.y);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        requestAnimationFrame(render);
      };

      resizeCanvas();
      requestAnimationFrame(render);
    }

    const photo = document.getElementById('photo');
    const savedPhoto = localStorage.getItem('chihebPhoto');

    if (savedPhoto) {
      photo.src = savedPhoto;
    }

    const typingText = document.getElementById('typingText');
    const phrases = ['Welcome all', 'Follow me on Instagram', 'Watch me on TikTok'];
    let phraseIndex = 0;
    let letterIndex = 0;
    let deleting = false;

    const typeNextLetter = () => {
      const phrase = phrases[phraseIndex];

      if (deleting) {
        letterIndex -= 1;
      } else {
        letterIndex += 1;
      }

      typingText.textContent = phrase.slice(0, letterIndex);

      if (!deleting && letterIndex === phrase.length) {
        deleting = true;
        setTimeout(typeNextLetter, 1200);
        return;
      }

      if (deleting && letterIndex === 0) {
        deleting = false;
        phraseIndex = (phraseIndex + 1) % phrases.length;
      }

      setTimeout(typeNextLetter, deleting ? 45 : 80);
    };

    typeNextLetter();

  </script>
</body>
</html>
